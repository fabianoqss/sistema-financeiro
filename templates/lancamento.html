{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-sm-10">
        <div class="card shadow">
            <div class="card-header text-white {{ 'bg-success' if tipo == 'receita' else 'bg-danger' }}">
                <h5 class="mb-0">
                    <i class="bi {{ 'bi-plus-circle' if tipo == 'receita' else 'bi-dash-circle' }}"></i>
                    Lançar {{ tipo | capitalize }}
                </h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <input type="text" name="descricao" class="form-control" required autofocus
                               placeholder="Ex: Salário, Aluguel...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Valor (R$)</label>
                        <input type="number" name="valor" step="0.01" min="0.01" class="form-control"
                               required placeholder="0.00">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Data</label>
                        <input type="date" name="data" class="form-control" value="{{ hoje }}">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Categoria</label>
                        <select name="categoria_id" class="form-select">
                            <option value="0">Sem categoria</option>
                            {% for c in categorias %}
                            <option value="{{ c.id }}">{{ c.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit"
                                class="btn flex-fill {{ 'btn-success' if tipo == 'receita' else 'btn-danger' }}">
                            <i class="bi bi-check-lg"></i> Salvar
                        </button>
                        <a href="/dashboard" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
