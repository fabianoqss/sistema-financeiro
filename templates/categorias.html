{% extends 'base.html' %}
{% block content %}
<h5 class="mb-4">Categorias</h5>

<div class="row g-4">
    <!-- Formulário nova categoria -->
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-header bg-white fw-semibold">
                <i class="bi bi-plus-circle"></i> Nova Categoria
            </div>
            <div class="card-body">
                <form method="POST" action="/categorias/nova">
                    <div class="mb-3">
                        <label class="form-label">Nome</label>
                        <input type="text" name="nome" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tipo</label>
                        <select name="tipo" class="form-select">
                            <option value="receita">Receita</option>
                            <option value="despesa">Despesa</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-check-lg"></i> Criar
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Lista de categorias -->
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white fw-semibold">
                <i class="bi bi-tags"></i> Minhas Categorias
            </div>
            <div class="card-body p-0">
                {% if categorias %}
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Nome</th>
                            <th>Tipo</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for c in categorias %}
                        <tr>
                            <td>{{ c.nome }}</td>
                            <td>
                                <span class="badge {{ 'bg-success' if c.tipo == 'receita' else 'bg-danger' }}">
                                    {{ c.tipo }}
                                </span>
                            </td>
                            <td>
                                <form method="POST" action="/categorias/excluir/{{ c.id }}"
                                      onsubmit="return confirm('Excluir a categoria \'{{ c.nome }}\'?')">
                                    <button class="btn btn-sm btn-outline-danger" type="submit">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                {% else %}
                <p class="text-muted text-center py-4 mb-0">Nenhuma categoria cadastrada.</p>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
