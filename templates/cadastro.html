{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-sm-10">
        <div class="card shadow mt-5">
            <div class="card-body p-4">
                <h4 class="text-center mb-4">Criar Conta</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nome completo</label>
                        <input type="text" name="nome" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" name="senha" class="form-control" required minlength="4">
                        <div class="form-text">Mínimo 4 caracteres.</div>
                    </div>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-person-plus"></i> Criar conta
                    </button>
                </form>
                <hr>
                <p class="text-center mb-0">
                    Já tem conta? <a href="/login">Fazer login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
